name: CI

on:
  push:
    branches: [main]
    paths:
      - 'shared/**'
      - 'backend/**'
      - 'frontend/**'
      - 'docs/**'
      - 'Taskfile.yml'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/ci.yml'

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'shared/**'
              - 'backend/**'
              - 'frontend/**'
              - 'Taskfile.yml'
              - 'flake.nix'
              - 'flake.lock'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - 'flake.nix'
              - 'flake.lock'
              - '.github/workflows/ci.yml'

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@main
        with:
          extra-conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore Nix cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-v1-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-v1-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Prefetch dev shell
        run: nix develop .#ci --command true

      - name: Check formatting
        if: steps.changes.outputs.code == 'true'
        run: nix develop .#ci --command task format:check

      - name: Build
        if: steps.changes.outputs.code == 'true'
        run: nix develop .#ci --command task build:local

      - name: Lint
        if: steps.changes.outputs.code == 'true'
        run: nix develop .#ci --command task lint

      - name: Run tests
        if: steps.changes.outputs.code == 'true'
        run: nix develop .#ci --command task test:unit

      - name: Build documentation
        if: steps.changes.outputs.docs == 'true'
        run: nix develop .#ci --command task docs:build
