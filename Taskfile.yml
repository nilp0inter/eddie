version: '3'

# Suppress go-task's own diagnostic output so each task's group
# contains only the real command output.
silent: true

# Buffer each task's output and wrap it in GitHub Actions log group
# markers. In CI, one collapsible section per task. Locally harmless.
output:
  group:
    begin: '::group::{{.TASK}}'
    end: '::endgroup::'

tasks:
  build:local:
    desc: Build the project
    cmds:
      - gleam build
    sources:
      - src/**/*.gleam
      - gleam.toml

  format:
    desc: Auto-format all Gleam source files
    cmds:
      - gleam format

  format:check:
    desc: Check formatting without modifying files
    cmds:
      - gleam format --check

  lint:
    desc: Lint the project (format check + glinter)
    deps:
      - format:check
    cmds:
      - gleam run -m glinter

  tests:unit:
    desc: Run all tests
    deps:
      - build:local
    cmds:
      - gleam test

  docs:build:
    desc: Build documentation site
    dir: docs
    cmds:
      - mdbook build
    sources:
      - src/**/*
      - book.toml
    generates:
      - book/**/*

  docs:serve:
    desc: Serve documentation with live reload
    dir: docs
    cmds:
      - mdbook serve --open
