version: '3'

# Suppress go-task's own diagnostic output so each task's group
# contains only the real command output.
silent: true

# Buffer each task's output and wrap it in GitHub Actions log group
# markers. In CI, one collapsible section per task. Locally harmless.
output:
  group:
    begin: '::group::{{.TASK}}'
    end: '::endgroup::'

tasks:
  # ── Shared ──────────────────────────────────────────────────────────
  shared:build:
    desc: Build the shared package
    dir: shared
    cmds:
      - gleam build
    sources:
      - src/**/*.gleam
      - gleam.toml

  shared:test:unit:
    desc: Run shared tests
    dir: shared
    deps:
      - shared:build
    cmds:
      - gleam test

  shared:format:
    desc: Format shared source files
    dir: shared
    cmds:
      - gleam format

  shared:format:check:
    desc: Check shared formatting
    dir: shared
    cmds:
      - gleam format --check

  # ── Backend ─────────────────────────────────────────────────────────
  backend:build:
    desc: Build the backend
    dir: backend
    deps:
      - shared:build
    cmds:
      - gleam build
    sources:
      - src/**/*.gleam
      - gleam.toml

  backend:test:unit:
    desc: Run backend tests
    dir: backend
    deps:
      - backend:build
    cmds:
      - gleam test

  backend:format:
    desc: Format backend source files
    dir: backend
    cmds:
      - gleam format

  backend:format:check:
    desc: Check backend formatting
    dir: backend
    cmds:
      - gleam format --check

  backend:lint:
    desc: Lint the backend (format check + glinter)
    dir: backend
    deps:
      - backend:format:check
    cmds:
      - gleam run -m glinter

  # ── Frontend ────────────────────────────────────────────────────────
  frontend:build:
    desc: Build the frontend
    dir: frontend
    deps:
      - shared:build
    cmds:
      - gleam build
    sources:
      - src/**/*.gleam
      - gleam.toml

  frontend:format:
    desc: Format frontend source files
    dir: frontend
    cmds:
      - gleam format

  frontend:format:check:
    desc: Check frontend formatting
    dir: frontend
    cmds:
      - gleam format --check

  frontend:bundle:
    desc: Bundle frontend JS for browser
    dir: frontend
    deps:
      - frontend:build
    cmds:
      - esbuild entrypoint.mjs --bundle --outfile=build/app.js --format=iife

  backend:run:
    desc: Run the backend server
    dir: backend
    deps:
      - backend:build
      - frontend:bundle
    cmds:
      - gleam run

  start:
    desc: Build everything and run the server
    cmds:
      - task: backend:run

  # ── Project-wide ────────────────────────────────────────────────────
  build:local:
    desc: Build all packages
    deps:
      - backend:build
      - frontend:bundle

  test:unit:
    desc: Run all tests
    deps:
      - shared:test:unit
      - backend:test:unit

  format:
    desc: Format all source files
    deps:
      - shared:format
      - backend:format
      - frontend:format

  format:check:
    desc: Check formatting across all packages
    deps:
      - shared:format:check
      - backend:format:check
      - frontend:format:check

  lint:
    desc: Lint all packages
    deps:
      - format:check
      - backend:lint

  # ── Docs ────────────────────────────────────────────────────────────
  docs:build:
    desc: Build documentation site
    dir: docs
    cmds:
      - mdbook build
    sources:
      - src/**/*
      - book.toml
    generates:
      - book/**/*

  docs:serve:
    desc: Serve documentation with live reload
    dir: docs
    cmds:
      - mdbook serve --open
